<!DOCTYPE html>
<html>
<head>
    <title>Owner Registration</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
</head>

<body>

<div class="page-center">

<div class="form-card">

<h2>Owner Registration</h2>

<form id="ownerForm">

<label>Owner Name</label>
<input type="text" id="owner_name" required>

<label>Address</label>
<input type="text" id="address" required>

<label>Contact Number</label>
<input type="text" id="contact" required>

<label>Pet Name</label>
<input type="text" id="pet_name" required>

<label>Pet Category</label>

<select id="pet_category">
    <option>Dog</option>
    <option>Cat</option>
    <option>Bird</option>
    <option>Rabbit</option>
</select>

<button type="submit">Register</button>

</form>

<div class="back-home">
    <a href="/">⬅ Back to Home</a>
</div>

</div>

</div>

<script>

document.getElementById('ownerForm').addEventListener('submit', async function(e){

    e.preventDefault();

    await fetch('/owners/register',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            owner_name:document.getElementById('owner_name').value,
            address:document.getElementById('address').value,
            contact:document.getElementById('contact').value,
            pet_name:document.getElementById('pet_name').value,
            pet_category:document.getElementById('pet_category').value

        })

    });

    alert("Owner Registered Successfully");

    window.location.href="/";

});

</script>

</body>
</html>
